[build]
  base = "web"
  command = "npm ci --omit=dev && npm run build"
  publish = "dist"
  environment = { VITE_SKIP_ENV_VALIDATION = "true" }

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  CI = "true"
  VITE_V2_ENABLED = "true"
  # Build optimization
  NPM_FLAGS = "--legacy-peer-deps"

# Development/Preview context
[context.deploy-preview]
  command = "npm ci && npm run build"

[context.deploy-preview.environment]
  NODE_ENV = "preview"
  VITE_API_URL = "https://staging-api.moneygenerator.app"
  VITE_V2_ENABLED = "true"

# Production context - optimized
[context.production]
  command = "npm ci --omit=dev && npm run build"

[context.production.environment]
  NODE_ENV = "production"
  VITE_API_URL = "https://api.moneygenerator.app"
  VITE_V2_ENABLED = "true"

# Branch context for feature branches
[context."feature/*"]
  command = "npm ci && npm run build"

[context."feature/*".environment]
  NODE_ENV = "development"
  VITE_API_URL = "https://staging-api.moneygenerator.app"
  VITE_V2_ENABLED = "true"

# API proxy for backend services - Production
[[redirects]]
  from = "/api/v2/*"
  to = "/.netlify/functions/proxy-api"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "https://api.moneygenerator.app/api/v1/:splat"
  status = 200
  force = true

# Explicit static routes
[[redirects]]
  from = "/health"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/status"
  to = "/index.html"
  status = 200

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# CACHING HEADERS - OPTIMIZED
# ============================================

# HTML - short cache (no caching guidance)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# CSS/JS bundles - long cache with hash
[[headers]]
  for = "/assets/*.{css,js}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Web fonts - aggressively cache
[[headers]]
  for = "*.{woff,woff2,ttf,otf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images - moderate cache
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# ============================================
# SECURITY HEADERS - PRODUCTION GRADE
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS filter
    X-XSS-Protection = "1; mode=block"
    # Strict referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HSTS for HTTPS enforcement (1 year)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy - strict
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.plaid.com https://cdn.segment.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.moneygenerator.app https://*.plaid.com https://*.segment.com; frame-src https://cdn.plaid.com; upgrade-insecure-requests"

# ============================================
# API HEADERS
# ============================================

[[headers]]
  for = "/api/*"
  [headers.values]
    # CORS headers
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-User-ID"
    Access-Control-Max-Age = "86400"
    # Cache API responses per endpoint
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

# ============================================
# COMPRESSION & PERFORMANCE
# ============================================

# Enable gzip/brotli compression (automatic on Netlify)
[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

# ============================================
# NETLIFY FUNCTIONS
# ============================================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]
  external_node_modules = ["express", "axios"]

# ============================================
# LIMITS & FEATURES
# ============================================

[env]
  [env.production]
    environment = { NODE_ENV = "production" }

[limits]
  functions = "32 MB"
  max_file_size = "25 MB"
