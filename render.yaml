# MoneyGeneratorApp — Render.com Deployment Config
# Docs: https://render.com/docs/render-yaml
services:
  - type: web
    name: moneygenerator-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm ci --production
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_SUBSCRIPTION_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_ANNUAL
        sync: false
      - key: STRIPE_PORTAL_URL
        sync: false
      - key: PLAID_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ANALYTICS_ENABLED
        value: "true"
